data:
  title: Attempted Assassination On President Trump
  subTitle: <p>Today has been a terrible day for the country. There was an attempted
    assassination on 45th President Donald Trump. During his speech in Butler, PA
    a number of shots rang out and you can see Trump grab his ear and hit the deck.</p>
